apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "egress-guardian-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "egress-guardian-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "egress-guardian-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "egress-guardian-operator.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "egress-guardian-operator.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ include "egress-guardian-operator.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect={{ .Values.operator.leaderElect }}
            - --health-probe-bind-address=:{{ .Values.healthProbe.port }}
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            - --flow-source={{ .Values.flowSource }}
            - --hubble-relay-address={{ .Values.hubble.relayAddress }}
            - --snapshot-interval={{ .Values.operator.snapshotInterval }}
          env:
            - name: EGRESS_GUARDIAN_FLOW_SOURCE
              value: {{ .Values.flowSource | quote }}
            - name: HUBBLE_RELAY_ADDRESS
              value: {{ .Values.hubble.relayAddress | quote }}
            - name: EGRESS_GUARDIAN_SNAPSHOT_INTERVAL
              value: {{ .Values.operator.snapshotInterval | quote }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.healthProbe.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
